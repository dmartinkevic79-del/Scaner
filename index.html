<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB Scan Pro + Flash</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 500px; border-radius: 12px; overflow: hidden; margin-bottom: 10px; border: 1px solid #444; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin-bottom: 15px; }
        button { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        .btn-scan { background: #007bff; grid-column: span 2; }
        .btn-download { background: #28a745; }
        .btn-clear { background: #dc3545; }
        .btn-torch { background: #f1c40f; color: #000; grid-column: span 2; display: none; } /* Появится при запуске */
        
        #list-container { width: 100%; max-width: 500px; background: #2d2d2d; border-radius: 12px; padding: 15px; box-sizing: border-box; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #aaa; border-bottom: 1px solid #444; padding-bottom: 8px; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        li { padding: 10px; border-bottom: 1px solid #3d3d3d; font-family: monospace; display: flex; justify-content: space-between; color: #00ff88; }
        .dup-error { color: #ff4757; text-align: center; font-weight: bold; margin: 5px; display: none; animation: shake 0.5s; }
        @keyframes shake { 0% {transform: translateX(0)} 25% {transform: translateX(5px)} 50% {transform: translateX(-5px)} 100% {transform: translateX(0)} }
    </style>
</head>
<body>

    <div id="reader"></div>
    <div id="dup-msg" class="dup-error">ПОВТОР! УЖЕ В СПИСКЕ</div>

    <div class="controls">
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">ВКЛЮЧИТЬ ФОНАРИК</button>
        <button class="btn-download" onclick="downloadTxt()">ВЫГРУЗИТЬ .TXT</button>
        <button class="btn-clear" onclick="clearList()">ОЧИСТИТЬ ВСЁ</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span>Всего уникальных:</span>
            <span id="count" style="color: white; font-weight: bold;">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes')) || [];
        let html5QrCode;
        let isTorchOn = false;

        window.onload = () => {
            codes.slice().reverse().forEach(c => renderItem(c));
            document.getElementById('count').innerText = codes.length;
            startScanner();
        };

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 250, height: 150 },
                videoConstraints: {
                    focusMode: "continuous",
                    advanced: [{ focusMode: "continuous" }, { zoom: 1.0 }]
                }
            };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                // Если браузер поддерживает фонарик, показываем кнопку
                const capabilities = html5QrCode.getRunningTrackCapabilities();
                if (capabilities.torch) {
                    document.getElementById('torch-button').style.display = 'block';
                }
            })
            .catch(err => console.error("Ошибка камеры", err));
        }

        function onScanSuccess(decodedText) {
            if (codes.includes(decodedText)) {
                showError();
                return;
            }

            codes.push(decodedText);
            localStorage.setItem('wb_codes', JSON.stringify(codes));
            renderItem(decodedText);
            document.getElementById('count').innerText = codes.length;
            
            // Звук (бип)
            new Audio('https://www.soundjay.com/buttons/beep-07.mp3').play();
        }

        function renderItem(text) {
            const list = document.getElementById('scanned-codes');
            const li = document.createElement('li');
            li.innerHTML = `<span>${text}</span> <span style="color:#666; font-size:10px;">${new Date().toLocaleTimeString()}</span>`;
            list.prepend(li);
        }

        function showError() {
            const msg = document.getElementById('dup-msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1500);
        }

        async function toggleTorch() {
            isTorchOn = !isTorchOn;
            try {
                await html5QrCode.applyVideoConstraints({
                    advanced: [{ torch: isTorchOn }]
                });
                document.getElementById('torch-button').innerText = isTorchOn ? "ВЫКЛЮЧИТЬ ФОНАРИК" : "ВКЛЮЧИТЬ ФОНАРИК";
            } catch (err) {
                alert("Фонарик не поддерживается на этом устройстве");
            }
        }

        function downloadTxt() {
            if (!codes.length) return alert("Список пуст");
            const blob = new Blob([codes.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `WB_Export_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
        }

        function clearList() {
            if (confirm("Удалить все отсканированные данные?")) {
                codes = [];
                localStorage.removeItem('wb_codes');
                document.getElementById('scanned-codes').innerHTML = '';
                document.getElementById('count').innerText = '0';
            }
        }
    </script>
</body>
</html>
