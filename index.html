<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB SCAN FIX 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; border: 2px solid #333; background: #222; aspect-ratio: 1/1; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin: 15px 0; }
        button { padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; transition: 0.3s; }
        
        .btn-start { background: #007bff; grid-column: span 2; font-size: 18px; box-shadow: 0 0 20px rgba(0,123,255,0.4); }
        .btn-torch { background: #f1c40f; color: #000; grid-column: span 2; display: none; }
        .btn-copy { background: #6f42c1; grid-column: span 2; }
        .btn-download { background: #28a745; }
        .btn-clear { background: #dc3545; }
        
        #list-container { width: 100%; max-width: 400px; background: #1a1a1a; border-radius: 15px; padding: 15px; box-sizing: border-box; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
        li { padding: 12px; border-bottom: 1px solid #222; font-family: monospace; display: flex; justify-content: space-between; color: #00ff88; }
        .toast { position: fixed; top: 20%; background: #28a745; padding: 15px; border-radius: 10px; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="toast-msg" class="toast">✅ КОПИРОВАНО</div>
    <div id="reader"></div>

    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 НАЖМИТЕ ЧТОБЫ ВКЛЮЧИТЬ КАМЕРУ</button>
        
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ВКЛЮЧИТЬ ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ ВСЁ</button>
        <button class="btn-download" onclick="downloadTxt()">.TXT</button>
        <button class="btn-clear" onclick="clearList()">ОЧИСТИТЬ</button>
    </div>

    <div id="list-container">
        <div class="status-bar"><span>КОДОВ:</span> <span id="count" style="font-size: 24px; color: #28a745;">0</span></div>
        <ul id="scanned-codes"></ul>
    </div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes')) || [];
        let html5QrCode;
        let isTorchOn = false;
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        window.onload = () => { renderList(); };

        async function initScanner() {
            // Прячем кнопку старта после нажатия
            document.getElementById('start-btn').style.display = 'none';
            
            if (html5QrCode) await html5QrCode.stop();
            html5QrCode = new Html5Qrcode("reader");

            const config = { 
                fps: 25, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };

            // Пытаемся запустить заднюю камеру (environment)
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                setTimeout(checkTorch, 1000); // Проверяем фонарик через секунду после старта
            })
            .catch(err => {
                alert("Ошибка! Проверьте настройки Safari: Настройки -> Safari -> Камера -> Разрешить");
            });
        }

        function checkTorch() {
            try {
                const track = html5QrCode.getRunningTrackCapabilities();
                if (track.torch) {
                    document.getElementById('torch-button').style.display = 'block';
                }
            } catch(e) { console.log("Фонарик не найден на этой линзе"); }
        }

        function onScanSuccess(text) {
            let processed = text.match(/\d{10}/) ? text.match(/\d{10}/)[0] : text;
            if (codes.includes(processed)) return;

            codes.push(processed);
            localStorage.setItem('wb_codes', JSON.stringify(codes));
            beep.play().catch(()=>{});
            renderList();
        }

        async function toggleTorch() {
            isTorchOn = !isTorchOn;
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] });
                document.getElementById('torch-button').innerText = isTorchOn ? "❌ ВЫКЛ ФОНАРИК" : "🔦 ВКЛ ФОНАРИК";
            } catch (e) { alert("Эта камера не поддерживает фонарик"); }
        }

        async function copyToClipboard() {
            const text = codes.join('\n');
            await navigator.clipboard.writeText(text);
            document.getElementById('toast-msg').style.display = 'block';
            setTimeout(() => document.getElementById('toast-msg').style.display = 'none', 1500);
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            codes.slice().reverse().forEach(t => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${t}</span> <span style="color:#444; font-size:10px;">${new Date().toLocaleTimeString()}</span>`;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        function downloadTxt() {
            const blob = new Blob([codes.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `WB_SCAN.txt`;
            a.click();
        }

        function clearList() {
            if (confirm("Очистить?")) {
                codes = []; localStorage.removeItem('wb_codes'); renderList();
            }
        }
    </script>
</body>
</html>
