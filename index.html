<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB SCAN ULTIMATE</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 500px; border-radius: 15px; overflow: hidden; border: 2px solid #333; background: #000; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin: 15px 0; }
        button { padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        .btn-switch { background: #007bff; grid-column: span 2; }
        .btn-download { background: #28a745; }
        .btn-clear { background: #dc3545; }
        .btn-torch { background: #ffc107; color: #000; grid-column: span 2; display: none; margin-top: 5px; }
        #list-container { width: 100%; max-width: 500px; background: #1e1e1e; border-radius: 15px; padding: 15px; box-sizing: border-box; width: 100%; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; }
        li { padding: 12px; border-bottom: 1px solid #2d2d2d; font-family: monospace; display: flex; justify-content: space-between; color: #00ff88; font-size: 16px; }
        .dup-error { position: fixed; top: 10%; background: #ff4757; color: white; padding: 15px; border-radius: 10px; display: none; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

    <div id="dup-msg" class="dup-error">⚠️ УЖЕ В СПИСКЕ</div>
    <div id="reader"></div>

    <div class="controls">
        <button class="btn-switch" onclick="switchCamera()">🔄 СМЕНИТЬ КАМЕРУ</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ФОНАРИК</button>
        <button class="btn-download" onclick="downloadTxt()">ВЫГРУЗИТЬ .TXT</button>
        <button class="btn-clear" onclick="clearList()">ОЧИСТИТЬ ВСЁ</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span>Уникальных:</span>
            <span id="count" style="font-size: 24px; font-weight: bold; color: #28a745;">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes')) || [];
        let html5QrCode;
        let cameras = [];
        let currentCamIdx = 0;
        let isTorchOn = false;
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        window.onload = async () => {
            renderList();
            try {
                cameras = await Html5Qrcode.getCameras();
                if (cameras.length > 0) {
                    let backIdx = cameras.findIndex(c => c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('rear'));
                    currentCamIdx = backIdx !== -1 ? backIdx : 0;
                    startScanner(cameras[currentCamIdx].id);
                }
            } catch (err) { alert("Ошибка камеры"); }
        };

        function startScanner(camId) {
            if (html5QrCode) { html5QrCode.stop().then(() => doStart(camId)); } 
            else { doStart(camId); }
        }

        function doStart(camId) {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(camId, { fps: 20, qrbox: { width: 280, height: 160 } }, onScanSuccess);
        }

        function onScanSuccess(originalText) {
            let processedText = originalText;

            // НОВАЯ ЛОГИКА: Ищем последовательность из 10 цифр (ваш ID)
            // Это сработает для $1:1:4664842324:50129598 и любых других форматов
            let match = originalText.match(/\d{10}/); 
            if (match) {
                processedText = match[0];
            }

            if (codes.includes(processedText)) {
                document.getElementById('dup-msg').style.display = 'block';
                setTimeout(() => document.getElementById('dup-msg').style.display = 'none', 1200);
                return;
            }

            codes.push(processedText);
            localStorage.setItem('wb_codes', JSON.stringify(codes));
            beep.play().catch(() => {});
            renderList();
        }

        async function switchCamera() {
            currentCamIdx = (currentCamIdx + 1) % cameras.length;
            await html5QrCode.stop();
            startScanner(cameras[currentCamIdx].id);
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            codes.slice().reverse().forEach(text => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${text}</span> <span style="color:#555; font-size:10px;">${new Date().toLocaleTimeString()}</span>`;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        function downloadTxt() {
            if (codes.length === 0) return;
            const blob = new Blob([codes.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `WB_SCAN.txt`;
            a.click();
        }

        function clearList() {
            if (confirm("Очистить?")) {
                codes = [];
                localStorage.removeItem('wb_codes');
                renderList();
            }
        }
    </script>
</body>
</html>
