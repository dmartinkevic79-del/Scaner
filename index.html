<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 15px; overflow: hidden; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-start { background: #007aff; color: white; }
        .btn-torch { background: #ffd60a; display: none; }
        .btn-copy { background: #34c759; color: white; }
        .btn-download { background: #5856d6; color: white; }
        .btn-clear { background: #ff3b30; color: white; }
        
        #list-container { margin-top: 25px; background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-bar { display: flex; justify-content: space-between; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 10px; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 12px 0; 
            border-bottom: 1px solid #eee; 
        }
        .code-text { font-family: monospace; font-size: 18px; color: #1c1c1e; }
        .time-text { font-size: 14px; color: #8e8e93; background: #f2f2f7; padding: 4px 8px; border-radius: 6px; }

        .msg { 
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%); 
            padding: 16px 32px; border-radius: 20px; display: none; z-index: 1000; 
            font-weight: 600; text-align: center; width: 80%; backdrop-filter: blur(10px);
        }
        .toast { background: rgba(50, 215, 75, 0.9); color: #fff; }
        .dup-error { background: rgba(255, 69, 58, 0.9); color: #fff; }
    </style>
</head>
<body>
    <div id="toast-msg" class="msg toast">✅ СКОПИРОВАНО</div>
    <div id="dup-msg" class="msg dup-error">⚠️ УЖЕ В СПИСКЕ</div>
    
    <div id="reader"></div>
    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 ЗАПУСТИТЬ СКАНЕР</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ВКЛЮЧИТЬ ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ СПИСОК</button>
        <button class="btn-download" onclick="downloadTxt()">СКАЧАТЬ .TXT</button>
        <button class="btn-clear" onclick="clearList()">ОЧИСТИТЬ</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span>ОБРАБОТАНО КОДОВ</span>
            <b id="count">0</b>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <script>
        // Теперь храним объекты {text: "код", time: "время"}
        let codes = JSON.parse(localStorage.getItem('wb_codes_v2')) || [];
        let html5QrCode;
        let isTorchOn = false;
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        window.onload = () => { renderList(); };

        async function initScanner() {
            const btn = document.getElementById('start-btn');
            btn.innerText = "ЗАГРУЗКА...";
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 250, height: 250 } };

            try {
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                btn.style.display = 'none';
                setTimeout(checkTorch, 2000); // Проверяем наличие фонарика через 2 сек
            } catch (err) {
                btn.innerText = "ОШИБКА КАМЕРЫ";
            }
        }

        function onScanSuccess(decodedText) {
            let match = decodedText.match(/\d{10,}/); // Ищем число от 10 знаков
            let processed = match ? match[0] : decodedText;

            // Проверка на дубликат (ищем по полю text)
            if (codes.some(item => item.text === processed)) {
                showMsg('dup-msg');
                return;
            }

            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            // Сохраняем как объект
            codes.push({ text: processed, time: timeStr });
            localStorage.setItem('wb_codes_v2', JSON.stringify(codes));
            
            beep.play().catch(() => {});
            renderList();
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            
            // Выводим список (последние сверху)
            codes.slice().reverse().forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="code-text">${item.text}</span>
                    <span class="time-text">${item.time}</span>
                `;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        async function toggleTorch() {
            isTorchOn = !isTorchOn;
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] });
                document.getElementById('torch-button').innerText = isTorchOn ? "❌ ВЫКЛЮЧИТЬ" : "🔦 ВКЛЮЧИТЬ ФОНАРИК";
            } catch (e) { console.log(e); }
        }

        function checkTorch() {
            try {
                const track = html5QrCode.getRunningTrackCapabilities();
                if (track && track.torch) document.getElementById('torch-button').style.display = 'block';
            } catch(e) {}
        }

        async function copyToClipboard() {
            if (!codes.length) return;
            const textToCopy = codes.map(c => `${c.text}\t${c.time}`).join('\n');
            await navigator.clipboard.writeText(textToCopy);
            showMsg('toast-msg');
        }

        function downloadTxt() {
            if (!codes.length) return;
            const content = codes.map(c => `${c.text} [${c.time}]`).join('\n');
            const b = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = `WB_SCAN_${new Date().toLocaleDateString()}.txt`;
            a.click();
        }

        function clearList() {
            if (confirm("Удалить все данные?")) {
                codes = [];
                localStorage.removeItem('wb_codes_v2');
                renderList();
            }
        }

        function showMsg(id) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 1500);
        }
    </script>
</body>
</html>
