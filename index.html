<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB SCAN PRO</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 500px; border-radius: 15px; overflow: hidden; border: 2px solid #333; background: #000; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin: 15px 0; }
        button { padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        
        /* КНОПКА ПЕРЕКЛЮЧЕНИЯ - ТЕПЕРЬ СИНЯЯ И ЗАМЕТНАЯ */
        .btn-switch { background: #007bff; grid-column: span 2; border: 2px solid #0056b3; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }
        
        .btn-download { background: #28a745; }
        .btn-clear { background: #dc3545; }
        .btn-torch { background: #ffc107; color: #000; grid-column: span 2; display: none; margin-top: 5px; }
        
        #list-container { width: 100%; max-width: 500px; background: #1e1e1e; border-radius: 15px; padding: 15px; box-sizing: border-box; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; }
        li { padding: 12px; border-bottom: 1px solid #2d2d2d; font-family: monospace; display: flex; justify-content: space-between; color: #00ff88; }
        .dup-error { position: fixed; top: 10%; background: #ff4757; color: white; padding: 15px; border-radius: 10px; display: none; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

    <div id="dup-msg" class="dup-error">⚠️ УЖЕ В СПИСКЕ</div>
    <div id="reader"></div>

    <div class="controls">
        <button class="btn-switch" onclick="switchCamera()">🔄 СМЕНИТЬ КАМЕРУ (ОСНОВНАЯ/СЕЛФИ)</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ВКЛЮЧИТЬ ФОНАРИК</button>
        <button class="btn-download" onclick="downloadTxt()">ВЫГРУЗИТЬ .TXT</button>
        <button class="btn-clear" onclick="clearList()">ОЧИСТИТЬ ВСЁ</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span>Уникальных:</span>
            <span id="count" style="font-size: 20px; font-weight: bold;">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes')) || [];
        let html5QrCode;
        let cameras = [];
        let currentCamIdx = 0;
        let isTorchOn = false;

        window.onload = async () => {
            renderList();
            try {
                cameras = await Html5Qrcode.getCameras();
                if (cameras.length > 0) {
                    // Пытаемся сразу найти заднюю камеру по слову Back или Rear
                    let backIdx = cameras.findIndex(c => c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('rear'));
                    currentCamIdx = backIdx !== -1 ? backIdx : 0;
                    startScanner(cameras[currentCamIdx].id);
                } else { alert("Камеры не найдены"); }
            } catch (err) { alert("Разрешите доступ к камере в настройках браузера!"); }
        };

        function startScanner(camId) {
            if (html5QrCode) { html5QrCode.stop().then(() => doStart(camId)); } 
            else { doStart(camId); }
        }

        function doStart(camId) {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 280, height: 160 },
                aspectRatio: 1.0
            };
            html5QrCode.start(camId, config, onScanSuccess)
            .then(() => {
                const caps = html5QrCode.getRunningTrackCapabilities();
                document.getElementById('torch-button').style.display = caps.torch ? 'block' : 'none';
            }).catch(e => console.error(e));
        }

        async function switchCamera() {
            if (cameras.length < 2) return alert("У вас только одна камера");
            currentCamIdx = (currentCamIdx + 1) % cameras.length;
            await html5QrCode.stop();
            startScanner(cameras[currentCamIdx].id);
        }

        function onScanSuccess(text) {
            if (codes.includes(text)) {
                document.getElementById('dup-msg').style.display = 'block';
                setTimeout(() => document.getElementById('dup-msg').style.display = 'none', 1200);
                return;
            }
            codes.push(text);
            localStorage.setItem('wb_codes', JSON.stringify(codes));
            renderList();
            new Audio('https://www.soundjay.com/buttons/beep-07.mp3').play().catch(() => {});
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            codes.slice().reverse().forEach(text => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${text}</span> <span style="color:#555; font-size:10px;">${new Date().toLocaleTimeString()}</span>`;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        async function toggleTorch() {
            isTorchOn = !isTorchOn;
            await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] });
            document.getElementById('torch-button').innerText = isTorchOn ? "❌ ВЫКЛ ФОНАРИК" : "🔦 ВКЛ ФОНАРИК";
        }

        function downloadTxt() {
            if (codes.length === 0) return;
            const blob = new Blob([codes.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `WB_SCAN_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
        }

        function clearList() {
            if (confirm("Удалить всё?")) {
                codes = [];
                localStorage.removeItem('wb_codes');
                renderList();
            }
        }
    </script>
</body>
</html>
