<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB SCAN PRO 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Квадратное окно сканера */
        #reader { width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; border: 2px solid #333; background: #222; aspect-ratio: 1 / 1; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin: 15px 0; }
        button { padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; -webkit-tap-highlight-color: transparent; transition: 0.2s; }
        
        /* Кнопка запуска для iPhone */
        .btn-start { background: #007bff; grid-column: span 2; font-size: 16px; border: 2px solid #0056b3; box-shadow: 0 0 15px rgba(0,123,255,0.3); }
        
        /* Кнопка фонарика */
        .btn-torch { background: #f1c40f; color: #000; grid-column: span 2; display: none; }
        
        .btn-copy { background: #6f42c1; grid-column: span 2; }
        .btn-download { background: #28a745; }
        .btn-clear { background: #dc3545; }

        #list-container { width: 100%; max-width: 400px; background: #1a1a1a; border-radius: 15px; padding: 15px; box-sizing: border-box; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        li { padding: 12px; border-bottom: 1px solid #222; font-family: monospace; display: flex; justify-content: space-between; color: #00ff88; font-size: 16px; }
        
        .toast, .dup-error { position: fixed; top: 15%; left: 50%; transform: translate(-50%, -50%); padding: 15px 25px; border-radius: 10px; display: none; z-index: 1000; font-weight: bold; text-align: center; width: 80%; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .toast { background: #28a745; color: white; }
        .dup-error { background: #ff4757; color: white; }
    </style>
</head>
<body>

    <div id="toast-msg" class="toast">✅ КОПИРОВАНО В БУФЕР</div>
    <div id="dup-msg" class="dup-error">⚠️ УЖЕ В СПИСКЕ</div>
    
    <div id="reader"></div>

    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 ВКЛЮЧИТЬ КАМЕРУ</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ВКЛЮЧИТЬ ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ ВСЁ</button>
        <button class="btn-download" onclick="downloadTxt()">.TXT</button>
        <button class="btn-clear" onclick="clearList()">ОЧИСТИТЬ</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span>КОДОВ:</span>
            <span id="count" style="font-size: 24px; font-weight: bold; color: #28a745;">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes')) || [];
        let html5QrCode;
        let isTorchOn = false;
        
        // Звук бипа
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        window.onload = () => { renderList(); };

        async function initScanner() {
            const btn = document.getElementById('start-btn');
            btn.innerText = "⏳ ЗАГРУЗКА...";

            if (html5QrCode) {
                try { await html5QrCode.stop(); } catch(e) {}
            }

            html5QrCode = new Html5Qrcode("reader");

            const config = { 
                fps: 25, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                btn.style.display = 'none';
                // Циклическая проверка фонарика (важно для Samsung и iPhone)
                let checkCount = 0;
                const checkInterval = setInterval(() => {
                    checkTorch();
                    checkCount++;
                    if (document.getElementById('torch-button').style.display === 'block' || checkCount > 6) {
                        clearInterval(checkInterval);
                    }
                }, 800);
            })
            .catch(err => {
                btn.innerText = "❌ ОШИБКА КАМЕРЫ";
                alert("Разрешите доступ к камере в настройках браузера!");
            });
        }

        function checkTorch() {
            try {
                const track = html5QrCode.getRunningTrackCapabilities();
                if (track && track.torch) {
                    document.getElementById('torch-button').style.display = 'block';
                }
            } catch(e) {}
        }

        function onScanSuccess(text) {
            // ФИЛЬТР: забираем только 10 цифр подряд
            let match = text.match(/\d{10}/);
            let processed = match ? match[0] : text;

            if (codes.includes(processed)) {
                showMsg('dup-msg');
                return;
            }

            codes.push(processed);
            localStorage.setItem('wb_codes', JSON.stringify(codes));
            beep.play().catch(() => {});
            renderList();
        }

        async function toggleTorch() {
            isTorchOn = !isTorchOn;
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] });
                const tBtn = document.getElementById('torch-button');
                tBtn.innerText = isTorchOn ? "❌ ВЫКЛ ФОНАРИК" : "🔦 ВКЛ ФОНАРИК";
                tBtn.style.background = isTorchOn ? "#ff4757" : "#f1c40f";
                tBtn.style.color = isTorchOn ? "#fff" : "#000";
            } catch (e) {
                alert("Фонарик не поддерживается этой камерой");
            }
        }

        async function copyToClipboard() {
            if (codes.length === 0) return;
            const textToCopy = codes.join('\n');
            try {
                await navigator.clipboard.writeText(textToCopy);
                showMsg('toast-msg');
            } catch (err) {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showMsg('toast-msg');
            }
        }

        function showMsg(id) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 1500);
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            codes.slice().reverse().forEach(text => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${text}</span> <span style="color:#444; font-size:10px;">${new Date().toLocaleTimeString()}</span>`;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        function downloadTxt() {
            if (codes.length === 0) return;
            const blob = new Blob([codes.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `WB_SCAN.txt`;
            a.click();
        }

        function clearList() {
            if (confirm("Удалить все коды?")) {
                codes = [];
                localStorage.removeItem('wb_codes');
                renderList();
            }
        }
    </script>
</body>
</html>
