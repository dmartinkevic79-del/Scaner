<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 24px; overflow: hidden; border: 2px solid #333; }
        .controls { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        button { padding: 18px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-start { background: #af52de; color: white; width: 100%; }
        .btn-copy { background: #af52de; color: white; }
        .row { display: flex; gap: 10px; }
        .btn-download { background: #1c1c1e; color: #32d74b; border: 1px solid #32d74b; flex: 1; }
        .btn-clear { background: #1c1c1e; color: #ff453a; border: 1px solid #ff453a; flex: 1; }
        .btn-torch { background: #ffd60a; color: #000; display: none; }

        #list-container { margin-top: 25px; background: #1c1c1e; border-radius: 24px; padding: 20px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .count-label { color: #8e8e93; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .count-value { color: #32d74b; font-size: 28px; font-weight: 800; }

        ul { list-style: none; padding: 0; margin: 0; }
        li { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 0; border-top: 1px solid #2c2c2e;
        }
        .code-text { font-size: 20px; font-weight: 500; color: #fff; letter-spacing: 0.5px; }
        .time-text { font-size: 14px; color: #636366; font-family: monospace; }

        .msg { 
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%); 
            padding: 16px 32px; border-radius: 20px; display: none; z-index: 1000; 
            font-weight: 600; text-align: center; width: 80%; backdrop-filter: blur(10px);
        }
        .toast { background: rgba(50, 215, 75, 0.9); color: #fff; }
        .dup-error { background: rgba(255, 69, 58, 0.9); color: #fff; }
    </style>
</head>
<body>
    <div id="toast-msg" class="msg toast">✅ СПИСОК СКОПИРОВАН</div>
    <div id="dup-msg" class="msg dup-error">⚠️ УЖЕ В СПИСКЕ</div>
    
    <div id="reader"></div>
    
    <div class="controls">
        <button id="start-btn" class="btn-start" onclick="initScanner()">🚀 ЗАПУСТИТЬ СКАНЕР</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ВКЛЮЧИТЬ ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ СПИСОК</button>
        <div class="row">
            <button class="btn-download" onclick="downloadTxt()">СКАЧАТЬ .TXT</button>
            <button class="btn-clear" onclick="clearList()">ОЧИСТИТЬ</button>
        </div>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span class="count-label">Обработано кодов</span>
            <span id="count" class="count-value">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <script>
        // Используем v3 для чистоты данных
        let codes = JSON.parse(localStorage.getItem('wb_codes_v3')) || [];
        let html5QrCode;
        let isTorchOn = false;
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        window.onload = () => { renderList(); };

        async function initScanner() {
            const btn = document.getElementById('start-btn');
            btn.innerText = "ЗАГРУЗКА...";
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: 250 }, onScanSuccess);
                btn.style.display = 'none';
                setTimeout(checkTorch, 2000);
            } catch (err) { btn.innerText = "ОШИБКА КАМЕРЫ"; }
        }

        function onScanSuccess(decodedText) {
            let match = decodedText.match(/\d{10,}/);
            let processed = match ? match[0] : decodedText;

            if (codes.some(item => item.text === processed)) {
                showMsg('dup-msg');
                return;
            }

            // Добавляем секунды в формат времени
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            codes.push({ text: processed, time: timeStr });
            localStorage.setItem('wb_codes_v3', JSON.stringify(codes));
            
            beep.play().catch(() => {});
            renderList();
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            codes.slice().reverse().forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="code-text">${item.text}</span>
                    <span class="time-text">${item.time}</span>
                `;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        async function copyToClipboard() {
            if (!codes.length) return;
            // Форматируем строку: Код - Время
            const textToCopy = codes.map(c => `${c.text} [${c.time}]`).join('\n');
            
            try {
                await navigator.clipboard.writeText(textToCopy);
                showMsg('toast-msg');
            } catch (err) {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showMsg('toast-msg');
            }
        }

        function downloadTxt() {
            if (!codes.length) return;
            const content = codes.map(c => `${c.text} | ${c.time}`).join('\n');
            const b = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = `WB_Export_${new Date().getTime()}.txt`;
            a.click();
        }

        function clearList() {
            if (confirm("Удалить весь список?")) {
                codes = [];
                localStorage.removeItem('wb_codes_v3');
                renderList();
            }
        }

        function showMsg(id) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        function checkTorch() {
            try {
                const track = html5QrCode.getRunningTrackCapabilities();
                if (track && track.torch) document.getElementById('torch-button').style.display = 'block';
            } catch(e) {}
        }

        async function toggleTorch() {
            isTorchOn = !isTorchOn;
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] });
                document.getElementById('torch-button').innerText = isTorchOn ? "❌ ВЫКЛЮЧИТЬ" : "🔦 ВКЛЮЧИТЬ ФОНАРИК";
            } catch (e) {}
        }
    </script>
</body>
</html>
