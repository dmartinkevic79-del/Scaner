<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB SCAN FIX</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Квадратное окно сканера */
        #reader { width: 100%; max-width: 400px; border-radius: 20px; overflow: hidden; border: 2px solid #333; background: #000; aspect-ratio: 1 / 1; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; margin: 15px 0; }
        button { padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; -webkit-tap-highlight-color: transparent; }
        
        /* Кнопка ФОНАРИК теперь главная */
        .btn-torch { background: #f1c40f; color: #000; grid-column: span 2; display: none; }
        .btn-copy { background: #6f42c1; grid-column: span 2; }
        .btn-download { background: #28a745; }
        .btn-clear { background: #dc3545; }
        
        .btn-switch-text { background: none; color: #666; font-size: 12px; text-decoration: underline; grid-column: span 2; padding: 5px; }

        #list-container { width: 100%; max-width: 400px; background: #1a1a1a; border-radius: 15px; padding: 15px; box-sizing: border-box; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        li { padding: 12px; border-bottom: 1px solid #222; font-family: monospace; display: flex; justify-content: space-between; color: #00ff88; font-size: 16px; }
        
        .toast, .dup-error { position: fixed; top: 15%; left: 50%; transform: translate(-50%, -50%); padding: 15px 25px; border-radius: 10px; display: none; z-index: 1000; font-weight: bold; text-align: center; width: 80%; }
        .toast { background: #28a745; color: white; }
        .dup-error { background: #ff4757; color: white; }
    </style>
</head>
<body>

    <div id="toast-msg" class="toast">✅ КОПИРОВАНО</div>
    <div id="dup-msg" class="dup-error">⚠️ УЖЕ В СПИСКЕ</div>
    
    <div id="reader"></div>

    <div class="controls">
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">🔦 ВКЛЮЧИТЬ ФОНАРИК</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 КОПИРОВАТЬ ВСЁ</button>
        <button class="btn-download" onclick="downloadTxt()">.TXT</button>
        <button class="btn-clear" onclick="clearList()">ОЧИСТИТЬ</button>
        <button class="btn-switch-text" onclick="switchCamera()">Сменить камеру, если не та</button>
    </div>

    <div id="list-container">
        <div class="status-bar">
            <span>КОДОВ:</span>
            <span id="count" style="font-size: 24px; font-weight: bold; color: #28a745;">0</span>
        </div>
        <ul id="scanned-codes"></ul>
    </div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes')) || [];
        let html5QrCode;
        let cameras = [];
        let currentCamIdx = 0;
        let isTorchOn = false;
        
        // Звук (совместимый с iOS)
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        window.onload = async () => {
            renderList();
            initScanner();
        };

        async function initScanner() {
            try {
                cameras = await Html5Qrcode.getCameras();
                if (cameras.length > 0) {
                    let backIdx = cameras.findIndex(c => c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('rear'));
                    currentCamIdx = backIdx !== -1 ? backIdx : 0;
                    startScanner(cameras[currentCamIdx].id);
                }
            } catch (err) {
                alert("На iPhone нужно разрешить доступ к камере в настройках Safari");
            }
        }

        function startScanner(camId) {
            if (html5QrCode) {
                html5QrCode.stop().then(() => doStart(camId)).catch(() => doStart(camId));
            } else {
                doStart(camId);
            }
        }

        function doStart(camId) {
            html5QrCode = new Html5Qrcode("reader");
            // Настройки специально под квадрат и iOS
            const config = { 
                fps: 25, 
                qrbox: (viewWidth, viewHeight) => {
                    const size = Math.min(viewWidth, viewHeight) * 0.8;
                    return { width: size, height: size };
                },
                aspectRatio: 1.0,
                videoConstraints: {
                    facingMode: "environment"
                }
            };

            html5QrCode.start(camId, config, onScanSuccess)
            .then(() => {
                // Проверка фонарика
                try {
                    const track = html5QrCode.getRunningTrackCapabilities();
                    if (track.torch) {
                        document.getElementById('torch-button').style.display = 'block';
                    }
                } catch(e) {}
            });
        }

        function onScanSuccess(originalText) {
            let processedText = originalText;
            let match = originalText.match(/\d{10}/); 
            if (match) { processedText = match[0]; }

            if (codes.includes(processedText)) {
                showMsg('dup-msg');
                return;
            }

            codes.push(processedText);
            localStorage.setItem('wb_codes', JSON.stringify(codes));
            
            // Воспроизведение звука (на iOS может сработать только после первого тапа по экрану)
            beep.play().catch(() => {});
            
            renderList();
        }

        async function copyToClipboard() {
            if (codes.length === 0) return;
            const textToCopy = codes.join('\n');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(textToCopy);
                showMsg('toast-msg');
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showMsg('toast-msg');
            }
        }

        function showMsg(id) {
            const el = document.getElementById(id);
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 1500);
        }

        async function switchCamera() {
            if (cameras.length < 2) return;
            currentCamIdx = (currentCamIdx + 1) % cameras.length;
            startScanner(cameras[currentCamIdx].id);
        }

        async function toggleTorch() {
            isTorchOn = !isTorchOn;
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] });
                document.getElementById('torch-button').innerText = isTorchOn ? "❌ ВЫКЛЮЧИТЬ ФОНАРИК" : "🔦 ВКЛЮЧИТЬ ФОНАРИК";
                document.getElementById('torch-button').style.background = isTorchOn ? "#ff4757" : "#f1c40f";
                document.getElementById('torch-button').style.color = isTorchOn ? "#fff" : "#000";
            } catch (e) {
                alert("Этот режим камеры не поддерживает фонарик");
            }
        }

        function renderList() {
            const list = document.getElementById('scanned-codes');
            list.innerHTML = '';
            codes.slice().reverse().forEach(text => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${text}</span> <span style="color:#444; font-size:10px;">${new Date().toLocaleTimeString()}</span>`;
                list.appendChild(li);
            });
            document.getElementById('count').innerText = codes.length;
        }

        function downloadTxt() {
            if (codes.length === 0) return;
            const blob = new Blob([codes.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `WB_SCAN.txt`;
            a.click();
        }

        function clearList() {
            if (confirm("Очистить всё?")) {
                codes = [];
                localStorage.removeItem('wb_codes');
                renderList();
            }
        }
    </script>
</body>
</html>
