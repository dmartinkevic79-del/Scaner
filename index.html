<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB Scan Pro</title>

    <link rel="icon" type="image/png" href="icon.png?v=1">
    <link rel="apple-touch-icon" href="icon.png?v=1">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f6f6f9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        #video {
            width: 100%;
            border-radius: 15px;
            background: #000;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #481173; /* Цвет Wildberries */
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #481173;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <video id="video" autoplay playsinline></video>
    <button class="btn" id="switchCamera">Сменить камеру</button>
    <div id="result">Ожидание сканирования...</div>
</div>

<script>
    // Твоя логика сканера и переключения камер будет здесь
    // Если нужно добавить скрипт обработки — скажи, я допишу!
</script>

</body>
</html>
