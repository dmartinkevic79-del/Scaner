<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB Scan Pro + Camera Switch</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 500px; border-radius: 12px; overflow: hidden; margin-bottom: 10px; border: 1px solid #444; background: #000; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin-bottom: 15px; }
        button { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; transition: 0.2s; }
        .btn-switch { background: #6c757d; grid-column: span 2; } /* Кнопка смены камер */
        .btn-download { background: #28a745; }
        .btn-clear { background: #dc3545; }
        .btn-torch { background: #f1c40f; color: #000; grid-column: span 2; display: none; }
        
        #list-container { width: 100%; max-width: 500px; background: #2d2d2d; border-radius: 12px; padding: 15px; box-sizing: border-box; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #aaa; border-bottom: 1px solid #444; padding-bottom: 8px; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        li { padding: 10px; border-bottom: 1px solid #3d3d3d; font-family: monospace; display: flex; justify-content: space-between; color: #00ff88; }
        .dup-error { color: #ff4757; text-align: center; font-weight: bold; margin: 5px; display: none; }
    </style>
</head>
<body>

    <div id="reader"></div>
    <div id="dup-msg" class="dup-error">ПОВТОР! УЖЕ В СПИСКЕ</div>

    <div class="controls">
        <button class="btn-switch" onclick="switchCamera()">СМЕНИТЬ КАМЕРУ</button>
        <button id="torch-button" class="btn-torch" onclick="toggleTorch()">ВКЛЮЧИТЬ ФОНАРИК</button>
        <button class="btn-download" onclick="downloadTxt()">ВЫГРУЗИТЬ .TXT</button>
        <button class="btn-clear" onclick="clearList()">ОЧИСТИТЬ ВСЁ</button>
    </div>

    <div id="list-container">
        <div class="status-bar"><span>Уникальных:</span> <span id="count" style="color:white; font-weight:bold;">0</span></div>
        <ul id="scanned-codes"></ul>
    </div>

    <script>
        let codes = JSON.parse(localStorage.getItem('wb_codes')) || [];
        let html5QrCode;
        let isTorchOn = false;
        let currentCameraId = null;
        let cameras = [];

        window.onload = () => {
            codes.slice().reverse().forEach(c => renderItem(c));
            document.getElementById('count').innerText = codes.length;
            initScanner();
        };

        async function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            try {
                // Получаем список всех доступных камер
                cameras = await Html5Qrcode.getCameras();
                if (cameras && cameras.length > 0) {
                    // Пытаемся найти заднюю камеру по умолчанию
                    let backCam = cameras.find(c => c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('rear'));
                    currentCameraId = backCam ? backCam.id : cameras[0].id;
                    startWithCamera(currentCameraId);
                } else {
                    alert("Камеры не найдены");
                }
            } catch (err) {
                console.error("Ошибка инициализации", err);
            }
        }

        function startWithCamera(cameraId) {
            const config = { 
                fps: 20, 
                qrbox: { width: 250, height: 150 },
                videoConstraints: { focusMode: "continuous" }
            };

            html5QrCode.start(cameraId, config, onScanSuccess)
            .then(() => {
                const caps = html5QrCode.getRunningTrackCapabilities();
                document.getElementById('torch-button').style.display = caps.torch ? 'block' : 'none';
                if (!caps.torch) isTorchOn = false;
            })
            .catch(err => console.error("Ошибка запуска камеры", err));
        }

        async function switchCamera() {
            if (cameras.length < 2) return alert("Доступна только одна камера");
            
            // Находим индекс текущей камеры и берем следующую
            let currentIndex = cameras.findIndex(c => c.id === currentCameraId);
            let nextIndex = (currentIndex + 1) % cameras.length;
            currentCameraId = cameras[nextIndex].id;

            if (html5QrCode.isScanning) {
                await html5QrCode.stop();
                startWithCamera(currentCameraId);
            }
        }

        function onScanSuccess(decodedText) {
            if (codes.includes(decodedText)) {
                showError();
                return;
            }
            codes.push(decodedText);
            localStorage.setItem('wb_codes', JSON.stringify(codes));
            renderItem(decodedText);
            document.getElementById('count').innerText = codes.length;
            new Audio('https://www.soundjay.com/buttons/beep-07.mp3').play();
        }

        function renderItem(text) {
            const list = document.getElementById('scanned-codes');
            const li = document.createElement('li');
            li.innerHTML = `<span>${text}</span> <span style="color:#666;font-size:10px;">${new Date().toLocaleTimeString()}</span>`;
            list.prepend(li);
        }

        function showError() {
            const msg = document.getElementById('dup-msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1500);
        }

        async function toggleTorch() {
            isTorchOn = !isTorchOn;
            try {
                await html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] });
                document.getElementById('torch-button').innerText = isTorchOn ? "ВЫКЛЮЧИТЬ ФОНАРИК" : "ВКЛЮЧИТЬ ФОНАРИК";
            } catch (e) { alert("Фонарик не поддерживается на этой камере"); }
        }

        function downloadTxt() {
            if (!codes.length) return alert("Список пуст");
            const blob = new Blob([codes.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `WB_Export_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
        }

        function clearList() {
            if (confirm("Удалить все данные?")) {
                codes = [];
                localStorage.removeItem('wb_codes');
                document.getElementById('scanned-codes').innerHTML = '';
                document.getElementById('count').innerText = '0';
            }
        }
    </script>
</body>
</html>
